<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview - Professional HR Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .interview-area {
            display: none;
        }
        .question-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.5;
            border-left: 4px solid #667eea;
        }
        .record-btn {
            background: #dc3545;
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px 0;
        }
        .record-btn.recording {
            background: #28a745;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .progress {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .results {
            display: none;
            white-space: pre-wrap;
            font-family: monospace;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI Professional Interview Coach</h1>
            <p>Real-time HR-grade mock interviews with instant feedback</p>
        </div>

        <div class="card" id="setup-card">
            <div class="input-group">
                <label>📧 Your Email</label>
                <input type="email" id="student-email" placeholder="student@college.edu">
            </div>
            <div class="input-group">
                <label>📋 Paste Job Description</label>
                <textarea id="job-description" rows="6" placeholder="Paste the full job description here..."></textarea>
            </div>
            <button onclick="startInterview()">🚀 Start Mock Interview</button>
        </div>

        <div class="card" id="interview-card" style="display:none;">
            <div class="progress">
                <div class="progress-bar" id="progress-bar" style="width:0%"></div>
            </div>
            <div id="question-display" class="question-box">Loading...</div>
            <button id="record-btn" class="record-btn" onclick="toggleRecording()">🎤 Click to Speak</button>
            <div id="feedback" class="score-display" style="display:none;"></div>
            <p id="status" style="color:#666; text-align:center; margin-top:10px;">Ready to begin</p>
        </div>

        <div class="card" id="results-card" style="display:none;">
            <h2>📊 Interview Results</h2>
            <div id="results-content" class="results"></div>
            <button onclick="location.reload()">🔄 Start New Interview</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
